# ============================================================
# 1. 触发条件 (Triggers)
# ============================================================
name: Build OpenWrt Firmware

on:
  workflow_dispatch:  # 允许在网页端手动点击按钮触发
    inputs:
      ssh:
        description: 'SSH connection to Actions (在编译前手动开启SSH调试)'
        required: false
        default: 'false'
  #schedule:
  #  - cron: 0 16 * * 5  # 定时触发：每周五 UTC 16:00 (北京时间周六 0:00)
  # push:
  #   branches: [ main ] # 取消注释则会在 push 代码到 main 分支时触发

# ============================================================
# 2. 全局环境变量 (Environment Variables)
# ============================================================
env:
  REPO_URL: https://github.com/fat4-alt/immortalwrt-mt798x-6.6-padavanonly
  REPO_BRANCH: openwrt-24.10-6.6
  CONFIG_FILE: .config
  DIY_SH: diy.sh
  FREE_SPACE: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

# ============================================================
# 3. 任务定义 (Jobs)
# ============================================================
jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    # --------------------------------------------------------
    # 步骤 1：检出当前仓库代码
    # --------------------------------------------------------
    - name: Checkout
      uses: actions/checkout@v5

    # --------------------------------------------------------
    # 步骤 2：清理磁盘空间 (OpenWrt 编译必备)
    # --------------------------------------------------------
    - name: Free Disk Space
      if: env.FREE_SPACE == 'true'
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    # --------------------------------------------------------
    # 步骤 3：初始化编译环境 (安装依赖)
    # --------------------------------------------------------
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # --------------------------------------------------------
    # 步骤 4：克隆 OpenWrt 源码
    # --------------------------------------------------------
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    # --------------------------------------------------------
    # 步骤 5：加载自定义脚本 (DIY) 和更新 Feeds
    # --------------------------------------------------------
    - name: Load custom feeds & Update feeds
      run: |
        cd openwrt
        [ -e $GITHUB_WORKSPACE/$DIY_SH ] && mv $GITHUB_WORKSPACE/$DIY_SH ./diy.sh
        chmod +x ./diy.sh
        ./diy.sh
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # --------------------------------------------------------
    # 步骤 6：生成配置文件 (.config)
    # --------------------------------------------------------
    - name: Generate configuration file
      run: |
        cd openwrt
        [ -e $GITHUB_WORKSPACE/$CONFIG_FILE ] && mv $GITHUB_WORKSPACE/$CONFIG_FILE .config
        make defconfig

    # --------------------------------------------------------
    # 步骤 7：下载依赖包
    # --------------------------------------------------------
    - name: Download packages
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    # --------------------------------------------------------
    # 步骤 8 (可选)：手动触发 SSH 调试 (编译前)
    # 在网页端手动运行时，将 ssh 设为 true 即可在编译前连入调试
    # --------------------------------------------------------
    - name: SSH connection (手动触发 - 编译前调试)
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3
      with:
        timeout-minutes: 30

    # --------------------------------------------------------
    # 步骤 9：编译固件
    # ★ continue-on-error: true → 编译失败不会中断工作流，
    #   而是继续执行后面的"编译失败SSH调试"步骤
    # --------------------------------------------------------
    - name: Compile the firmware
      id: compile
      continue-on-error: true
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # --------------------------------------------------------
    # 步骤 10：编译失败时自动启动 SSH 调试
    # ★ 当编译步骤实际结果为 failure 时触发
    #   连接后会在 Actions 日志中输出 SSH 连接命令
    #   SSH 会话最长保持 120 分钟，连接后执行
    #     touch /tmp/continue 可提前结束会话
    # --------------------------------------------------------
    - name: SSH connection (编译出错 - 自动进入调试)
      if: steps.compile.outcome == 'failure'
      uses: mxschmitt/action-tmate@v3
      with:
        timeout-minutes: 120

    # --------------------------------------------------------
    # 步骤 11：编译失败时终止工作流
    # ★ 如果编译失败且 SSH 调试已结束，则手动标记失败并终止
    # --------------------------------------------------------
    - name: Check compile result
      if: steps.compile.outcome == 'failure'
      run: |
        echo "=========================================="
        echo "  ❌ 编译失败！请检查 SSH 调试日志。"
        echo "=========================================="
        exit 1

    # --------------------------------------------------------
    # 步骤 12：整理并上传固件 (Artifacts)
    # ★ 仅在编译成功时执行
    # --------------------------------------------------------
    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && steps.compile.outcome == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v5
      if: steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
